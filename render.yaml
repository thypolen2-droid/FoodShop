services:
  - type: web
    name: foodshop
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OWNER_PASSWORD_HASH
        sync: false
      - key: STORE_FILE
        value: /var/data/store.json
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
